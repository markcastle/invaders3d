<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>INVADERS://3D</title>
<style>
  :root{
    --bg:#05060e;
    --cyan:#27e8ff;
    --magenta:#ff3df0;
    --lime:#9dff3d;
    --amber:#ffc83d;
    --dim:#5a6480;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;background:var(--bg)}
  body{font-family:'Courier New',ui-monospace,monospace;color:var(--cyan);-webkit-user-select:none;user-select:none;touch-action:none}
  #game{position:fixed;inset:0;display:block}

  /* ---- HUD ---- */
  #hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:flex-start;
       padding:14px 22px;pointer-events:none;z-index:5;font-size:14px;letter-spacing:.18em;
       text-shadow:0 0 8px rgba(39,232,255,.7)}
  #hud .block{display:flex;flex-direction:column;gap:2px}
  #hud .label{font-size:10px;color:var(--dim);letter-spacing:.3em;text-shadow:none}
  #hud .val{font-size:20px;font-weight:bold}
  #hud .right{text-align:right}
  #lives{color:var(--lime);text-shadow:0 0 8px rgba(157,255,61,.7)}
  #wave-val{color:var(--magenta);text-shadow:0 0 8px rgba(255,61,240,.7)}

  /* ---- overlay screens ---- */
  .screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
          gap:18px;z-index:10;background:radial-gradient(ellipse at center,rgba(5,6,14,.55) 0%,rgba(5,6,14,.92) 100%);
          text-align:center;padding:20px}
  .hidden{display:none !important}
  h1{font-size:clamp(34px,8vw,72px);letter-spacing:.14em;color:#fff;line-height:1.05;
     text-shadow:0 0 6px var(--cyan),0 0 24px var(--cyan),0 0 60px rgba(39,232,255,.5)}
  h1 .alt{color:var(--magenta);text-shadow:0 0 6px var(--magenta),0 0 24px var(--magenta),0 0 60px rgba(255,61,240,.5)}
  .sub{color:var(--dim);letter-spacing:.4em;font-size:12px;text-transform:uppercase}
  .blink{animation:blink 1.1s steps(2,start) infinite;font-size:16px;letter-spacing:.3em;color:var(--lime);
         text-shadow:0 0 10px rgba(157,255,61,.8)}
  @keyframes blink{to{visibility:hidden}}
  .table{display:grid;grid-template-columns:auto auto;gap:6px 26px;font-size:14px;letter-spacing:.2em;margin-top:6px}
  .table .pts{text-align:left;color:#fff}
  .k{display:inline-block;border:1px solid var(--dim);border-radius:4px;padding:1px 8px;margin:0 3px;color:#fff;font-size:12px}
  .controls{color:var(--dim);font-size:12px;letter-spacing:.15em;line-height:2}
  #final-score{font-size:26px;color:var(--amber);letter-spacing:.2em;text-shadow:0 0 14px rgba(255,200,61,.8)}
  #go-title{color:#fff;text-shadow:0 0 6px var(--magenta),0 0 24px var(--magenta)}
  #wave-banner{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:8;pointer-events:none}
  #wave-banner span{font-size:clamp(26px,6vw,52px);letter-spacing:.4em;color:var(--magenta);
    text-shadow:0 0 20px rgba(255,61,240,.9);opacity:0;transform:scale(1.4)}
  #wave-banner.show span{animation:wavein 1.6s ease-out forwards}
  @keyframes wavein{0%{opacity:0;transform:scale(1.5)}20%{opacity:1;transform:scale(1)}80%{opacity:1}100%{opacity:0}}

  /* ---- scanlines / vignette ---- */
  #crt{position:fixed;inset:0;pointer-events:none;z-index:20;
       background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 1px,transparent 1px 3px)}
  #vig{position:fixed;inset:0;pointer-events:none;z-index:21;
       background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,5,.55) 100%)}

  /* ---- touch controls ---- */
  #touch{position:fixed;bottom:0;left:0;right:0;display:none;justify-content:space-between;
         padding:0 18px calc(18px + env(safe-area-inset-bottom));z-index:15}
  body.touch #touch{display:flex}
  .tbtn{width:74px;height:74px;border-radius:50%;border:1px solid rgba(39,232,255,.5);color:var(--cyan);
        background:rgba(39,232,255,.07);font-size:26px;display:flex;align-items:center;justify-content:center;
        backdrop-filter:blur(2px);text-shadow:0 0 8px var(--cyan)}
  .tbtn:active{background:rgba(39,232,255,.25)}
  #tfire{border-color:rgba(255,61,240,.6);color:var(--magenta);background:rgba(255,61,240,.08);font-size:15px;letter-spacing:.1em;text-shadow:0 0 8px var(--magenta)}
  #tfire:active{background:rgba(255,61,240,.28)}
  .tgroup{display:flex;gap:14px}
</style>
</head>
<body>
<canvas id="game"></canvas>

<div id="hud">
  <div class="block"><span class="label">SCORE</span><span class="val" id="score">0</span></div>
  <div class="block" style="text-align:center"><span class="label">HI-SCORE</span><span class="val" id="hiscore">0</span></div>
  <div class="block right"><span class="label">WAVE</span><span class="val" id="wave-val">1</span><span id="lives">▲ ▲ ▲</span></div>
</div>

<div id="wave-banner"><span id="wave-text">WAVE 1</span></div>

<div class="screen" id="title-screen">
  <div class="sub">EARTH DEFENCE GRID // v3.0</div>
  <h1>INVADERS<span class="alt">://3D</span></h1>
  <div class="table">
    <span style="color:var(--magenta)">◆ SQUID</span><span class="pts">30 PTS</span>
    <span style="color:var(--cyan)">◆ CRAB</span><span class="pts">20 PTS</span>
    <span style="color:var(--lime)">◆ OCTOPUS</span><span class="pts">10 PTS</span>
    <span style="color:var(--amber)">◆ MOTHERSHIP</span><span class="pts">??? PTS</span>
  </div>
  <div class="controls">
    <span class="k">◀</span><span class="k">▶</span> or <span class="k">A</span><span class="k">D</span> MOVE&nbsp;&nbsp;
    <span class="k">SPACE</span> FIRE&nbsp;&nbsp;<span class="k">P</span> PAUSE
  </div>
  <div class="blink" id="start-prompt">PRESS ENTER TO START</div>
</div>

<div class="screen hidden" id="gameover-screen">
  <h1 id="go-title">GAME OVER</h1>
  <div class="sub" id="go-flavour">THE GRID HAS FALLEN</div>
  <div id="final-score">SCORE 0</div>
  <div class="blink">PRESS ENTER TO RETRY</div>
</div>

<div class="screen hidden" id="pause-screen">
  <h1 style="font-size:clamp(26px,5vw,44px)">PAUSED</h1>
  <div class="blink">PRESS P TO RESUME</div>
</div>

<div id="touch">
  <div class="tgroup">
    <div class="tbtn" id="tleft">◀</div>
    <div class="tbtn" id="tright">▶</div>
  </div>
  <div class="tbtn" id="tfire">FIRE</div>
</div>

<div id="crt"></div>
<div id="vig"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
'use strict';
/* =====================================================================
   INVADERS://3D — a modern 3D take on the 1978 classic.
   Single file. Three.js for rendering, Web Audio for the bleeps.
   ===================================================================== */

// ---------------------------------------------------------------------
// Tunables
// ---------------------------------------------------------------------
const FIELD_X      = 16;     // half-width of the playfield
const PLAYER_Z     = 12.5;   // player's row
const BUNKER_Z     = 9;      // bunker row
const INVADE_Z     = 9.0;    // invaders reaching this z = game over
const COLS         = 10;
const ROWS         = 5;
const SPACING_X    = 3.0;
const SPACING_Z    = 2.5;
const PX           = 0.21;   // voxel size for invaders
const PLAYER_SPEED = 17;
const BULLET_SPEED = 38;
const EBULLET_BASE = 11;
const MAX_PBULLETS = 2;

// ---------------------------------------------------------------------
// Voxel art — two animation frames per species
// ---------------------------------------------------------------------
const ART = {
  squid: [[
    '...##...',
    '..####..',
    '.######.',
    '##.##.##',
    '########',
    '..#..#..',
    '.#.##.#.',
    '#.#..#.#'],[
    '...##...',
    '..####..',
    '.######.',
    '##.##.##',
    '########',
    '.#.##.#.',
    '#......#',
    '.#....#.']],
  crab: [[
    '..#.....#..',
    '...#...#...',
    '..#######..',
    '.##.###.##.',
    '###########',
    '#.#######.#',
    '#.#.....#.#',
    '...##.##...'],[
    '..#.....#..',
    '#..#...#..#',
    '#.#######.#',
    '###.###.###',
    '###########',
    '.#########.',
    '..#.....#..',
    '.#.......#.']],
  octo: [[
    '....####....',
    '.##########.',
    '############',
    '###..##..###',
    '############',
    '...##..##...',
    '..##.##.##..',
    '##........##'],[
    '....####....',
    '.##########.',
    '############',
    '###..##..###',
    '############',
    '..###..###..',
    '.##..##..##.',
    '..##....##..']],
  ufo: [[
    '.....######.....',
    '...##########...',
    '..############..',
    '.##.##.##.##.##.',
    '################',
    '...###....###...'],[
    '.....######.....',
    '...##########...',
    '..############..',
    '.#.##.##.##.##.#',
    '################',
    '...###....###...']]
};
const ROW_SPEC = [ // top row first
  {art:'squid', color:0xff3df0, pts:30},
  {art:'crab',  color:0x27e8ff, pts:20},
  {art:'crab',  color:0x27e8ff, pts:20},
  {art:'octo',  color:0x9dff3d, pts:10},
  {art:'octo',  color:0x9dff3d, pts:10}
];

// ---------------------------------------------------------------------
// Renderer / scene / camera
// ---------------------------------------------------------------------
const canvas   = document.getElementById('game');
const renderer = new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x05060e);
scene.fog = new THREE.Fog(0x05060e, 40, 95);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 200);
const CAM_HOME = new THREE.Vector3(0, 21, 27);
camera.position.copy(CAM_HOME);
camera.lookAt(0, 0, -2);

scene.add(new THREE.AmbientLight(0x334466, 0.9));
const keyLight = new THREE.DirectionalLight(0xbfd9ff, 0.9);
keyLight.position.set(8, 20, 10);
scene.add(keyLight);
const rimLight = new THREE.PointLight(0xff3df0, 0.7, 80);
rimLight.position.set(-14, 8, -18);
scene.add(rimLight);
const playerLight = new THREE.PointLight(0x27e8ff, 1.0, 18);
playerLight.position.set(0, 2, PLAYER_Z);
scene.add(playerLight);

// Neon grid floor
const grid = new THREE.GridHelper(120, 60, 0x16325a, 0x101c36);
grid.position.y = -1.4;
scene.add(grid);

// Starfield
(function makeStars(){
  const n = 900, pos = new Float32Array(n*3);
  for (let i=0;i<n;i++){
    pos[i*3]   = (Math.random()-0.5)*180;
    pos[i*3+1] = Math.random()*70 - 5;
    pos[i*3+2] = -Math.random()*140 + 20;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const m = new THREE.PointsMaterial({color:0x9fb6ff, size:0.22, sizeAttenuation:true, transparent:true, opacity:0.8});
  scene.add(new THREE.Points(g, m));
})();

// ---------------------------------------------------------------------
// Geometry helpers
// ---------------------------------------------------------------------
// Merge a voxel bitmap into a single BufferGeometry (one draw call per invader).
function voxelGeometry(pattern, size){
  const rows = pattern.length, cols = pattern[0].length;
  const box  = new THREE.BoxGeometry(size, size, size);
  const bp = box.attributes.position.array;
  const bn = box.attributes.normal.array;
  const bi = box.index.array;
  const positions = [], normals = [], indices = [];
  let vo = 0;
  for (let r=0;r<rows;r++){
    for (let c=0;c<cols;c++){
      if (pattern[r][c] !== '#') continue;
      const ox = (c-(cols-1)/2)*size;
      const oy = ((rows-1)/2-r)*size;
      for (let i=0;i<bp.length;i+=3){
        positions.push(bp[i]+ox, bp[i+1]+oy, bp[i+2]);
        normals.push(bn[i], bn[i+1], bn[i+2]);
      }
      for (let i=0;i<bi.length;i++) indices.push(bi[i]+vo);
      vo += bp.length/3;
    }
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  g.setAttribute('normal',   new THREE.Float32BufferAttribute(normals, 3));
  g.setIndex(indices);
  return g;
}
// Pre-bake both frames for every species
const GEO = {};
for (const k in ART) GEO[k] = [voxelGeometry(ART[k][0], PX), voxelGeometry(ART[k][1], PX)];
GEO.ufo = [voxelGeometry(ART.ufo[0], PX*1.2), voxelGeometry(ART.ufo[1], PX*1.2)];

function glowMat(color, intensity){
  return new THREE.MeshStandardMaterial({
    color, emissive:color, emissiveIntensity:intensity===undefined?0.55:intensity,
    roughness:0.35, metalness:0.25
  });
}

// ---------------------------------------------------------------------
// Player ship
// ---------------------------------------------------------------------
function buildPlayer(){
  const g = new THREE.Group();
  const hull = new THREE.Mesh(new THREE.ConeGeometry(0.55, 2.2, 4), glowMat(0x27e8ff, 0.5));
  hull.rotation.x = -Math.PI/2;
  hull.rotation.z = Math.PI/4;
  hull.position.y = 0.25;
  g.add(hull);
  const wingGeo = new THREE.BoxGeometry(2.6, 0.16, 1.0);
  const wing = new THREE.Mesh(wingGeo, glowMat(0x1899b4, 0.35));
  wing.position.set(0, 0.05, 0.45);
  g.add(wing);
  const finGeo = new THREE.BoxGeometry(0.12, 0.6, 0.7);
  const finL = new THREE.Mesh(finGeo, glowMat(0xff3df0, 0.8));
  finL.position.set(-1.25, 0.3, 0.55); g.add(finL);
  const finR = finL.clone(); finR.position.x = 1.25; g.add(finR);
  const engine = new THREE.Mesh(new THREE.SphereGeometry(0.22, 10, 10),
    new THREE.MeshBasicMaterial({color:0xffc83d}));
  engine.position.set(0, 0.1, 1.0);
  g.add(engine);
  g.userData.engine = engine;
  g.position.set(0, 0, PLAYER_Z);
  return g;
}

// ---------------------------------------------------------------------
// Bunkers — destructible voxel shields
// ---------------------------------------------------------------------
const BUNKER_ART = [
  '.######.',
  '########',
  '########',
  '##....##'
];
const bunkerBlocks = []; // {mesh, hp, alive}
function buildBunkers(){
  const size = 0.46;
  const mat = glowMat(0x9dff3d, 0.4);
  const geo = new THREE.BoxGeometry(size, size, size);
  for (const bx of [-10.5, 0, 10.5]){
    for (let r=0;r<BUNKER_ART.length;r++){
      for (let c=0;c<BUNKER_ART[r].length;c++){
        if (BUNKER_ART[r][c] !== '#') continue;
        const m = new THREE.Mesh(geo, mat.clone());
        m.position.set(bx + (c-3.5)*size, (BUNKER_ART.length-1-r)*size*0.9, BUNKER_Z);
        m.userData = {hp:2};
        scene.add(m);
        bunkerBlocks.push(m);
      }
    }
  }
}
function resetBunkers(){
  for (const b of bunkerBlocks){ b.userData.hp = 2; b.visible = true; b.material.opacity = 1; b.material.transparent = false; }
}
function hitBunkerBlock(b){
  b.userData.hp--;
  if (b.userData.hp <= 0){ b.visible = false; }
  else { b.material.transparent = true; b.material.opacity = 0.45; }
}

// ---------------------------------------------------------------------
// Audio — tiny synth, no assets
// ---------------------------------------------------------------------
const AudioFX = {
  ctx:null, stepIdx:0, ufoOsc:null, ufoGain:null,
  ensure(){
    if (!this.ctx){
      const AC = window.AudioContext || window.webkitAudioContext;
      if (AC) this.ctx = new AC();
    }
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  },
  beep(freq, dur, type, vol, slide){
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(slide,1), t+dur);
    g.gain.setValueAtTime(vol===undefined?0.12:vol, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g).connect(this.ctx.destination);
    o.start(t); o.stop(t+dur+0.02);
  },
  noise(dur, vol, freq){
    if (!this.ctx) return;
    const t = this.ctx.currentTime;
    const len = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<len;i++) d[i] = (Math.random()*2-1) * (1-i/len);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const f = this.ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value = freq||900;
    const g = this.ctx.createGain(); g.gain.value = vol===undefined?0.25:vol;
    src.connect(f).connect(g).connect(this.ctx.destination);
    src.start(t);
  },
  shoot(){ this.beep(880, 0.12, 'square', 0.08, 180); },
  invHit(){ this.noise(0.18, 0.22, 1400); this.beep(220, 0.1, 'sawtooth', 0.07, 60); },
  playerHit(){ this.noise(0.7, 0.4, 500); this.beep(160, 0.6, 'sawtooth', 0.12, 30); },
  step(){
    const seq = [110, 98, 87, 78];
    this.beep(seq[this.stepIdx % 4], 0.09, 'triangle', 0.16);
    this.stepIdx++;
  },
  ufoStart(){
    if (!this.ctx || this.ufoOsc) return;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    const lfo = this.ctx.createOscillator(), lg = this.ctx.createGain();
    o.type='sine'; o.frequency.value = 620;
    lfo.frequency.value = 9; lg.gain.value = 120;
    lfo.connect(lg).connect(o.frequency);
    g.gain.value = 0.05;
    o.connect(g).connect(this.ctx.destination);
    o.start(); lfo.start();
    this.ufoOsc = [o, lfo]; this.ufoGain = g;
  },
  ufoStop(){
    if (this.ufoOsc){ try{ this.ufoOsc[0].stop(); this.ufoOsc[1].stop(); }catch(e){} this.ufoOsc = null; }
  },
  ufoScore(){ this.beep(1200, 0.3, 'square', 0.1, 2400); }
};

// ---------------------------------------------------------------------
// Particle explosions
// ---------------------------------------------------------------------
const explosions = [];
function explode(pos, color, count, speed){
  const n = count || 26;
  const positions = new Float32Array(n*3);
  const vels = [];
  for (let i=0;i<n;i++){
    positions[i*3]=pos.x; positions[i*3+1]=pos.y; positions[i*3+2]=pos.z;
    const a = Math.random()*Math.PI*2, b = Math.random()*Math.PI - Math.PI/2;
    const s = (speed||7) * (0.4 + Math.random()*0.8);
    vels.push(new THREE.Vector3(Math.cos(a)*Math.cos(b)*s, Math.sin(b)*s + 2, Math.sin(a)*Math.cos(b)*s));
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const m = new THREE.PointsMaterial({color, size:0.34, transparent:true, opacity:1, blending:THREE.AdditiveBlending, depthWrite:false});
  const p = new THREE.Points(g, m);
  scene.add(p);
  explosions.push({points:p, vels, life:0.8, age:0});
}
function updateExplosions(dt){
  for (let i=explosions.length-1;i>=0;i--){
    const e = explosions[i];
    e.age += dt;
    const arr = e.points.geometry.attributes.position.array;
    for (let j=0;j<e.vels.length;j++){
      e.vels[j].y -= 9*dt;
      arr[j*3]   += e.vels[j].x*dt;
      arr[j*3+1] += e.vels[j].y*dt;
      arr[j*3+2] += e.vels[j].z*dt;
    }
    e.points.geometry.attributes.position.needsUpdate = true;
    e.points.material.opacity = Math.max(0, 1 - e.age/e.life);
    if (e.age >= e.life){
      scene.remove(e.points);
      e.points.geometry.dispose(); e.points.material.dispose();
      explosions.splice(i,1);
    }
  }
}

// ---------------------------------------------------------------------
// Game state
// ---------------------------------------------------------------------
const G = {
  mode:'title',           // title | playing | dying | gameover | paused
  score:0, hiscore:0, lives:3, wave:1,
  pBullets:[], eBullets:[],
  swarm:null, invaders:[],
  dir:1, stepTimer:0, stepInterval:0.9, frame:0,
  fireTimer:0, fireInterval:1.4,
  ufo:null, ufoTimer:12,
  invuln:0, shake:0, deathTimer:0,
  pausedFrom:null
};
const player = buildPlayer();
scene.add(player);
buildBunkers();

const input = {left:false, right:false, fire:false};

// Bullet factories ----------------------------------------------------
const pBulletGeo = new THREE.BoxGeometry(0.14, 0.14, 0.9);
const pBulletMat = new THREE.MeshBasicMaterial({color:0x9dff3d});
const eBulletGeo = new THREE.BoxGeometry(0.18, 0.18, 0.7);
const eBulletMat = new THREE.MeshBasicMaterial({color:0xff3df0});

function firePlayer(){
  if (G.pBullets.length >= MAX_PBULLETS) return;
  const b = new THREE.Mesh(pBulletGeo, pBulletMat);
  b.position.copy(player.position); b.position.y = 0.3; b.position.z -= 1.4;
  scene.add(b);
  G.pBullets.push(b);
  AudioFX.shoot();
}
function fireEnemy(x, z, speed){
  const b = new THREE.Mesh(eBulletGeo, eBulletMat);
  b.position.set(x, 0.3, z + 0.8);
  b.userData.speed = speed;
  scene.add(b);
  G.eBullets.push(b);
}

// Swarm ---------------------------------------------------------------
function buildSwarm(wave){
  if (G.swarm) scene.remove(G.swarm);
  G.swarm = new THREE.Group();
  G.invaders = [];
  const startZ = -13 + Math.min(wave-1, 4) * 1.2; // each wave starts closer
  for (let r=0;r<ROWS;r++){
    const spec = ROW_SPEC[r];
    for (let c=0;c<COLS;c++){
      const m = new THREE.Mesh(GEO[spec.art][0], glowMat(spec.color));
      m.position.set((c-(COLS-1)/2)*SPACING_X, 0.6, startZ + r*SPACING_Z);
      m.userData = {alive:true, art:spec.art, pts:spec.pts, color:spec.color, bobPhase:Math.random()*Math.PI*2};
      G.swarm.add(m);
      G.invaders.push(m);
    }
  }
  scene.add(G.swarm);
  G.dir = 1;
  G.stepTimer = 0;
  G.frame = 0;
  G.stepInterval = Math.max(0.32, 0.9 - (wave-1)*0.07);
  G.fireInterval = Math.max(0.45, 1.5 - (wave-1)*0.15);
  G.fireTimer = 1.2;
}
function aliveInvaders(){ return G.invaders.filter(i => i.userData.alive); }

// Mothership ----------------------------------------------------------
function spawnUfo(){
  const fromLeft = Math.random() < 0.5;
  const m = new THREE.Mesh(GEO.ufo[0], glowMat(0xffc83d, 0.8));
  m.position.set(fromLeft ? -FIELD_X-6 : FIELD_X+6, 2.2, -16.5);
  m.userData = {dir: fromLeft ? 1 : -1, frame:0, ft:0};
  scene.add(m);
  G.ufo = m;
  AudioFX.ufoStart();
}
function killUfo(){
  if (!G.ufo) return;
  scene.remove(G.ufo);
  G.ufo = null;
  AudioFX.ufoStop();
}

// ---------------------------------------------------------------------
// HUD / screens
// ---------------------------------------------------------------------
const $ = id => document.getElementById(id);
function updateHUD(){
  $('score').textContent = G.score;
  $('hiscore').textContent = G.hiscore;
  $('wave-val').textContent = G.wave;
  $('lives').textContent = '▲ '.repeat(Math.max(0, G.lives)).trim() || '—';
}
function showWaveBanner(){
  $('wave-text').textContent = 'WAVE ' + G.wave;
  const b = $('wave-banner');
  b.classList.remove('show');
  void b.offsetWidth; // restart animation
  b.classList.add('show');
}
function setScreen(name){
  $('title-screen').classList.toggle('hidden', name !== 'title');
  $('gameover-screen').classList.toggle('hidden', name !== 'gameover');
  $('pause-screen').classList.toggle('hidden', name !== 'paused');
}

// ---------------------------------------------------------------------
// Game flow
// ---------------------------------------------------------------------
function startGame(){
  G.score = 0; G.lives = 3; G.wave = 1;
  clearBullets();
  resetBunkers();
  killUfo();
  G.ufoTimer = 10 + Math.random()*10;
  buildSwarm(G.wave);
  player.position.x = 0;
  player.visible = true;
  G.invuln = 0;
  G.mode = 'playing';
  setScreen('none');
  updateHUD();
  showWaveBanner();
}
function nextWave(){
  G.wave++;
  clearBullets();
  killUfo();
  G.ufoTimer = 10 + Math.random()*10;
  buildSwarm(G.wave);
  if (G.wave % 3 === 1 && G.wave > 1) resetBunkers(); // fresh shields every 3 waves
  updateHUD();
  showWaveBanner();
}
function clearBullets(){
  for (const b of G.pBullets) scene.remove(b);
  for (const b of G.eBullets) scene.remove(b);
  G.pBullets.length = 0;
  G.eBullets.length = 0;
}
function gameOver(reason){
  G.mode = 'gameover';
  killUfo();
  G.hiscore = Math.max(G.hiscore, G.score);
  $('final-score').textContent = 'SCORE ' + G.score;
  $('go-flavour').textContent = reason === 'landed' ? 'THE INVADERS HAVE LANDED' : 'THE GRID HAS FALLEN';
  setScreen('gameover');
  updateHUD();
}
function playerDeath(){
  AudioFX.playerHit();
  explode(player.position.clone().add(new THREE.Vector3(0,0.4,0)), 0x27e8ff, 60, 10);
  explode(player.position.clone().add(new THREE.Vector3(0,0.4,0)), 0xffffff, 30, 6);
  G.shake = 0.8;
  G.lives--;
  updateHUD();
  player.visible = false;
  clearEnemyBulletsNearPlayer();
  if (G.lives <= 0){
    G.mode = 'dying'; G.deathTimer = 1.4;
  } else {
    G.mode = 'dying'; G.deathTimer = 1.1;
  }
}
function clearEnemyBulletsNearPlayer(){
  for (let i=G.eBullets.length-1;i>=0;i--){
    if (G.eBullets[i].position.z > PLAYER_Z - 6){
      scene.remove(G.eBullets[i]); G.eBullets.splice(i,1);
    }
  }
}
function addScore(n){
  G.score += n;
  if (G.score > G.hiscore) G.hiscore = G.score;
  updateHUD();
}

// ---------------------------------------------------------------------
// Input
// ---------------------------------------------------------------------
window.addEventListener('keydown', e => {
  if (e.repeat) return;
  AudioFX.ensure();
  switch (e.code){
    case 'ArrowLeft': case 'KeyA': input.left = true; break;
    case 'ArrowRight': case 'KeyD': input.right = true; break;
    case 'Space':
      e.preventDefault();
      if (G.mode === 'playing') firePlayer();
      else if (G.mode === 'title' || G.mode === 'gameover') startGame();
      break;
    case 'Enter':
      if (G.mode === 'title' || G.mode === 'gameover') startGame();
      break;
    case 'KeyP':
      if (G.mode === 'playing'){ G.mode = 'paused'; setScreen('paused'); AudioFX.ufoStop(); }
      else if (G.mode === 'paused'){ G.mode = 'playing'; setScreen('none'); if (G.ufo) AudioFX.ufoStart(); }
      break;
  }
});
window.addEventListener('keyup', e => {
  switch (e.code){
    case 'ArrowLeft': case 'KeyA': input.left = false; break;
    case 'ArrowRight': case 'KeyD': input.right = false; break;
  }
});

// Touch controls
if ('ontouchstart' in window){
  document.body.classList.add('touch');
  $('start-prompt').textContent = 'TAP TO START';
  const hold = (el, key) => {
    el.addEventListener('touchstart', e => { e.preventDefault(); AudioFX.ensure(); input[key] = true; }, {passive:false});
    el.addEventListener('touchend',   e => { e.preventDefault(); input[key] = false; }, {passive:false});
    el.addEventListener('touchcancel',() => { input[key] = false; });
  };
  hold($('tleft'), 'left');
  hold($('tright'), 'right');
  $('tfire').addEventListener('touchstart', e => {
    e.preventDefault(); AudioFX.ensure();
    if (G.mode === 'playing') firePlayer();
  }, {passive:false});
  const tapStart = e => {
    AudioFX.ensure();
    if (G.mode === 'title' || G.mode === 'gameover') startGame();
  };
  $('title-screen').addEventListener('touchstart', tapStart);
  $('gameover-screen').addEventListener('touchstart', tapStart);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------------------------------------------------------------------
// Update loops
// ---------------------------------------------------------------------
function updatePlayer(dt){
  let v = 0;
  if (input.left) v -= 1;
  if (input.right) v += 1;
  player.position.x = THREE.MathUtils.clamp(player.position.x + v*PLAYER_SPEED*dt, -FIELD_X, FIELD_X);
  player.rotation.z = THREE.MathUtils.lerp(player.rotation.z, -v*0.35, 10*dt);
  playerLight.position.x = player.position.x;
  // engine flicker
  player.userData.engine.scale.setScalar(0.8 + Math.random()*0.5);
  // invulnerability blink
  if (G.invuln > 0){
    G.invuln -= dt;
    player.visible = Math.floor(G.invuln*12) % 2 === 0;
    if (G.invuln <= 0) player.visible = true;
  }
}

function updateSwarm(dt){
  const alive = aliveInvaders();
  if (alive.length === 0){ nextWave(); return; }

  // pacing scales with how many remain — the classic panic curve
  const ratio = alive.length / (ROWS*COLS);
  const interval = THREE.MathUtils.lerp(0.06, G.stepInterval, ratio);

  G.stepTimer += dt;
  if (G.stepTimer >= interval){
    G.stepTimer = 0;
    // measure swarm extents in world space
    let minX = Infinity, maxX = -Infinity, maxZ = -Infinity;
    for (const inv of alive){
      const wx = G.swarm.position.x + inv.position.x;
      minX = Math.min(minX, wx); maxX = Math.max(maxX, wx);
      maxZ = Math.max(maxZ, G.swarm.position.z + inv.position.z);
    }
    const stepX = 0.55;
    if ((G.dir > 0 && maxX + stepX > FIELD_X) || (G.dir < 0 && minX - stepX < -FIELD_X)){
      G.dir *= -1;
      G.swarm.position.z += 0.85; // descend
    } else {
      G.swarm.position.x += G.dir * stepX;
    }
    // toggle animation frame
    G.frame = 1 - G.frame;
    for (const inv of alive) inv.geometry = GEO[inv.userData.art][G.frame];
    AudioFX.step();
    // landed?
    if (maxZ >= INVADE_Z){ gameOver('landed'); return; }
  }

  // gentle hover bob
  const t = performance.now()/1000;
  for (const inv of alive) inv.position.y = 0.6 + Math.sin(t*2 + inv.userData.bobPhase)*0.12;

  // enemy fire — bottom-most invader of a random occupied column
  if (G.mode !== 'playing') return; // attract mode never shoots
  G.fireTimer -= dt;
  if (G.fireTimer <= 0){
    G.fireTimer = G.fireInterval * (0.6 + Math.random()*0.8);
    const cols = {};
    for (const inv of alive){
      const key = Math.round(inv.position.x*10);
      if (!cols[key] || inv.position.z > cols[key].position.z) cols[key] = inv;
    }
    const shooters = Object.values(cols);
    const s = shooters[Math.floor(Math.random()*shooters.length)];
    if (s) fireEnemy(G.swarm.position.x + s.position.x, G.swarm.position.z + s.position.z,
                     EBULLET_BASE + G.wave*1.2);
  }
}

function updateUfo(dt){
  if (G.ufo){
    G.ufo.position.x += G.ufo.userData.dir * 9 * dt;
    G.ufo.userData.ft += dt;
    if (G.ufo.userData.ft > 0.18){
      G.ufo.userData.ft = 0;
      G.ufo.userData.frame = 1 - G.ufo.userData.frame;
      G.ufo.geometry = GEO.ufo[G.ufo.userData.frame];
    }
    if (Math.abs(G.ufo.position.x) > FIELD_X + 8) killUfo();
  } else {
    G.ufoTimer -= dt;
    if (G.ufoTimer <= 0){
      G.ufoTimer = 16 + Math.random()*14;
      spawnUfo();
    }
  }
}

function updateBullets(dt){
  // player bullets
  for (let i=G.pBullets.length-1;i>=0;i--){
    const b = G.pBullets[i];
    b.position.z -= BULLET_SPEED*dt;
    let dead = b.position.z < -24;

    // vs invaders
    if (!dead){
      for (const inv of aliveInvaders()){
        const wx = G.swarm.position.x + inv.position.x;
        const wz = G.swarm.position.z + inv.position.z;
        if (Math.abs(b.position.x - wx) < 1.15 && Math.abs(b.position.z - wz) < 1.0){
          inv.userData.alive = false;
          inv.visible = false;
          addScore(inv.userData.pts);
          explode(new THREE.Vector3(wx, 0.8, wz), inv.userData.color, 30, 8);
          AudioFX.invHit();
          dead = true;
          break;
        }
      }
    }
    // vs UFO
    if (!dead && G.ufo &&
        Math.abs(b.position.x - G.ufo.position.x) < 1.6 &&
        Math.abs(b.position.z - G.ufo.position.z) < 1.4){
      const bonus = [50,100,150,300][Math.floor(Math.random()*4)];
      addScore(bonus);
      explode(G.ufo.position.clone(), 0xffc83d, 45, 9);
      AudioFX.ufoScore();
      killUfo();
      dead = true;
    }
    // vs bunkers
    if (!dead && Math.abs(b.position.z - BUNKER_Z) < 1.0){
      for (const blk of bunkerBlocks){
        if (!blk.visible) continue;
        if (Math.abs(b.position.x - blk.position.x) < 0.32){
          hitBunkerBlock(blk);
          explode(blk.position.clone(), 0x9dff3d, 8, 3);
          dead = true;
          break;
        }
      }
    }
    if (dead){ scene.remove(b); G.pBullets.splice(i,1); }
  }

  // enemy bullets
  for (let i=G.eBullets.length-1;i>=0;i--){
    const b = G.eBullets[i];
    b.position.z += b.userData.speed*dt;
    b.rotation.z += 8*dt;
    let dead = b.position.z > PLAYER_Z + 4;

    // vs bunkers
    if (!dead && Math.abs(b.position.z - BUNKER_Z) < 1.0){
      for (const blk of bunkerBlocks){
        if (!blk.visible) continue;
        if (Math.abs(b.position.x - blk.position.x) < 0.32){
          hitBunkerBlock(blk);
          explode(blk.position.clone(), 0xff3df0, 8, 3);
          dead = true;
          break;
        }
      }
    }
    // vs player
    if (!dead && G.invuln <= 0 && G.mode === 'playing' &&
        Math.abs(b.position.z - PLAYER_Z) < 1.0 &&
        Math.abs(b.position.x - player.position.x) < 1.2){
      dead = true;
      scene.remove(b); G.eBullets.splice(i,1);
      playerDeath();
      return;
    }
    if (dead){ scene.remove(b); G.eBullets.splice(i,1); }
  }
}

function updateCamera(dt){
  // subtle parallax follow + shake
  const targetX = player.position.x * 0.18;
  camera.position.x = THREE.MathUtils.lerp(camera.position.x, CAM_HOME.x + targetX, 3*dt);
  camera.position.y = CAM_HOME.y;
  camera.position.z = CAM_HOME.z;
  if (G.shake > 0){
    G.shake = Math.max(0, G.shake - dt);
    camera.position.x += (Math.random()-0.5) * G.shake * 1.2;
    camera.position.y += (Math.random()-0.5) * G.shake * 1.2;
  }
  camera.lookAt(camera.position.x*0.4, 0, -2);
}

// ---------------------------------------------------------------------
// Main loop
// ---------------------------------------------------------------------
let last = performance.now();
function loop(now){
  requestAnimationFrame(loop);
  let dt = (now - last)/1000;
  last = now;
  if (dt > 0.05) dt = 0.05; // tab-switch protection

  if (G.mode === 'playing'){
    updatePlayer(dt);
    updateSwarm(dt);
    if (G.mode === 'playing'){ // swarm update can end the game
      updateUfo(dt);
      updateBullets(dt);
    }
  } else if (G.mode === 'dying'){
    G.deathTimer -= dt;
    updateBullets(dt);
    if (G.deathTimer <= 0){
      if (G.lives <= 0) gameOver('shot');
      else {
        player.position.x = 0;
        player.visible = true;
        G.invuln = 2.0;
        G.mode = 'playing';
      }
    }
  } else if (G.mode === 'title'){
    // idle attract: slow swarm drift behind the title card
    if (!G.swarm) buildSwarm(1);
    updateSwarm(dt * 0.5);
  }

  updateExplosions(dt);
  updateCamera(dt);
  renderer.render(scene, camera);
}

// Attract-mode safety: never let the demo swarm trigger game over.
const realGameOver = gameOver;
gameOver = function(reason){
  if (G.mode === 'title'){ buildSwarm(1); return; }
  realGameOver(reason);
};

updateHUD();
requestAnimationFrame(loop);
</script>
